<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#deddda"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="none"
        stroke="#000000" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Monitor fader track -->
  <rect x="41" y="28" width="6" height="72" rx="3" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="41" y="56" width="6" height="44" rx="3" fill="#ffffff"/>

  <!-- Stream fader track -->
  <rect x="81" y="28" width="6" height="72" rx="3" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="81" y="74" width="6" height="26" rx="3" fill="#ffffff"/>

  <!-- Fader knobs -->
  <g>
    <rect x="31" y="48" width="26" height="16" rx="8" fill="#000000" fill-opacity="0.2"
          transform="translate(0 1.5)"/>
    <rect x="31" y="48" width="26" height="16" rx="8" fill="url(#knob)"/>
  </g>
  <g>
    <rect x="71" y="66" width="26" height="16" rx="8" fill="#000000" fill-opacity="0.2"
          transform="translate(0 1.5)"/>
    <rect x="71" y="66" width="26" height="16" rx="8" fill="url(#knob)"/>
  </g>
</svg>
